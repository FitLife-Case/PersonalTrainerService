name: Build and Push Docker Image

on:
  push:
    branches:
      - develop
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Saet version
        id: version
        run: echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Restore pakker
        run: dotnet restore

      - name: Byg
        run: dotnet build --no-restore -c Release /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Koer tests
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Log ind paa Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Byg og push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            awesomebromonus/personaltrainer-service:latest
            awesomebromonus/personaltrainer-service:${{ steps.version.outputs.VERSION }}
